id: thepiratafilmes
name: ThePirataFilmes
description: "ThePirataFilmes - Catálogo de filmes e séries brasileiros"
language: pt-BR
type: public
encoding: UTF-8

links:
  - https://www.thepiratafilmes.online
  - https://catalago.online/

caps:
  categories:
    2000: Movies
    5000: TV

  modes:
    search: [q]
    tv-search: [q, imdbid, tvdbid, tmdbid]
    movie-search: [q, imdbid, tmdbid]

settings: []

search:
  paths:
    - path: "/api/search"
      method: get
      response:
        type: json
      inputs:
        q: "{{ .Keywords }}"
        imdbid: "{{ .Query.IMDBID }}"
        tmdbid: "{{ .Query.TMDBID }}"

  rows:
    selector: "$[*]"

  fields:
    title:
      selector: "title"

    size:
      selector: "size"
      optional: true

    download:
      selector: "magnet_link"

    seeders:
      selector: "seed_count"
      optional: true

    imdbid:
      selector: "imdb"
      optional: true

    details:
      selector: "details"
      optional: true

    category:
      selector: "category"
